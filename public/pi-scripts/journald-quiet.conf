# Pi Control Center — quiet journald by default. För felsökning:
#   sudo rm /etc/systemd/journald.conf.d/quiet.conf && sudo systemctl restart systemd-journald

[Journal]
# Lagra bara err+ — droppar warning/notice/info inklusive kernel-bruset
# från BLE-controllern. Hårdvarufel, oops, OOM-kills syns fortfarande.
MaxLevelStore=err
# Volatil journal i RAM, max 10MB ringbuffer.
Storage=volatile
RuntimeMaxUse=10M
